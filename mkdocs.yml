site_name: Janus
site_description: The two-faced AI routing gateway
site_url: https://amanverasia.github.io/Janus/
repo_url: https://github.com/amanverasia/Janus
repo_name: amanverasia/Janus
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Getting Started:
      - Overview: index.md
      - Getting Started: getting-started.md
      - Client Setup: client-setup.md
      - Deployment: deployment.md
  - Guides:
      - Providers: providers.md
      - Combos & Fallback: combos.md
      - Token Savers: token-savers.md
      - Key Inventory: inventory.md
      - Budgets: budgets.md
      - Dashboard: dashboard.md
  - Reference:
      - Configuration: configuration.md
      - API Reference: api-reference.md
      - CLI: cli.md
      - Changelog: changelog.md
  - Development:
      - Architecture: architecture.md
      - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

exclude_docs: |
  superpowers/
