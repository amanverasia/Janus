<nav class="flex flex-wrap items-center justify-between gap-3 mb-6" aria-label="Key inventory sections">
    <div class="inline-flex flex-wrap rounded-lg bg-gray-800 p-1 border border-gray-700">
        {% set tabs = [
            ('/dashboard/inventory', 'Overview', 'overview'),
            ('/dashboard/inventory/keys', 'All Keys', 'keys'),
            ('/dashboard/inventory/add', 'Add Keys', 'add'),
            ('/dashboard/inventory/import', 'Import JSON', 'import'),
        ] %}
        {% for href, label, tab_id in tabs %}
        <a href="{{ href }}"
           class="px-4 py-1.5 rounded-md text-sm font-medium transition-colors
           {% if active == tab_id %}bg-blue-600 text-white{% else %}text-gray-400 hover:text-white{% endif %}">
            {{ label }}
        </a>
        {% endfor %}
    </div>
</nav>
