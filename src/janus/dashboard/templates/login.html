<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Janus</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #111827; }</style>
</head>
<body class="h-full flex items-center justify-center">
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-8 max-w-md w-full mx-4">
        <div class="flex items-center space-x-2 mb-6">
            <span class="text-3xl">🏛️</span>
            <span class="text-xl font-bold text-white">Janus Dashboard</span>
        </div>
        <p class="text-gray-400 text-sm mb-6">
            Remote access requires sign-in. Use your dashboard username and password, or a Janus API key.
        </p>
        {% if error %}
        <div class="mb-4 bg-red-900/50 border border-red-700 rounded-lg px-4 py-3 text-red-200 text-sm">
            {{ error }}
        </div>
        {% endif %}

        {% if password_login_enabled %}
        <form method="post" action="/dashboard/login" class="space-y-4 mb-6">
            <input type="hidden" name="next" value="{{ next }}">
            <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide">Username &amp; Password</h2>
            <div>
                <label class="block text-gray-400 text-sm mb-1">Username</label>
                <input type="text" name="username" required autocomplete="username"
                       class="w-full bg-gray-900 text-white rounded-lg px-3 py-2 border border-gray-700 text-sm">
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-1">Password</label>
                <input type="password" name="password" required autocomplete="current-password"
                       class="w-full bg-gray-900 text-white rounded-lg px-3 py-2 border border-gray-700 text-sm">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 text-sm font-medium transition-colors">
                Sign in
            </button>
        </form>

        <div class="relative mb-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-700"></div></div>
            <div class="relative flex justify-center text-xs"><span class="bg-gray-800 px-2 text-gray-500">or</span></div>
        </div>
        {% endif %}

        <form method="post" action="/dashboard/login" class="space-y-4">
            <input type="hidden" name="next" value="{{ next }}">
            <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide">API Key</h2>
            <div>
                <label class="block text-gray-400 text-sm mb-1">API Key</label>
                <input type="password" name="api_key" {% if not password_login_enabled %}required autofocus{% endif %}
                       placeholder="sk-janus-..."
                       class="w-full bg-gray-900 text-white rounded-lg px-3 py-2 border border-gray-700 text-sm">
            </div>
            <button type="submit"
                    class="w-full bg-gray-700 hover:bg-gray-600 text-white rounded-lg px-4 py-2 text-sm font-medium transition-colors">
                Sign in with API Key
            </button>
        </form>
    </div>
</body>
</html>
