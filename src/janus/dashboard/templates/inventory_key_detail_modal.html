<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70" onclick="if(event.target===this)document.getElementById('key-detail-modal').classList.add('hidden')">
    <div class="bg-gray-800 border border-gray-700 rounded-xl w-full max-w-3xl max-h-[85vh] overflow-y-auto" onclick="event.stopPropagation()">
        <div class="sticky top-0 bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
            <h2 class="text-lg font-semibold text-white">Key Detail</h2>
            <button type="button" onclick="document.getElementById('key-detail-modal').classList.add('hidden')"
                    class="text-gray-400 hover:text-white text-xl leading-none cursor-pointer">&times;</button>
        </div>
        <div id="key-detail-body" class="p-6 text-gray-300 text-sm"></div>
    </div>
</div>
